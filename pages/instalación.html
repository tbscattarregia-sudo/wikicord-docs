<h1>NODE_DEPLOY_INIT</h1>

<p>Guía de instalación de un bot de Discord.</p>

<h2>Requisitos</h2>

<pre>
Node.js >= 18
Discord.js
Token de bot
</pre>

<h2>Instalación</h2>

<pre>
npm init -y
npm install discord.js
</pre>
